[package]
name = "inkstream"
version = "0.1.0"
description = "InkStream desktop writing application"
edition = "2021"

[lib]
name = "inkstream_lib"
# 仅 rlib：桌面端 main.rs 经 rlib 链接即可。cdylib/staticlib 为移动端
# （iOS/Android）所需，本项目不在范围；且 gnu 工具链 ld 对 cdylib 全量导出
# 报 "export ordinal too large"（>65535 导出上限），保留会阻断 build/test。
crate-type = ["rlib"]

[build-dependencies]
tauri-build = { version = "=2.6.2", features = [] }

[dependencies]
tauri = { version = "=2.11.2", features = [] }
tauri-plugin-window-state = "=2.4.1"
tauri-plugin-store = "=2.4.3"
tauri-plugin-fs = "=2.5.1"
serde = { version = "=1.0.228", features = ["derive"] }
serde_json = "=1.0.150"
