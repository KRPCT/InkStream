[package]
name = "inkstream"
version = "0.1.0"
description = "InkStream desktop writing application"
edition = "2021"

[lib]
name = "inkstream_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "=2.6.2", features = [] }

[dependencies]
tauri = "=2.11.2"
tauri-plugin-window-state = "=2.4.1"
tauri-plugin-store = "=2.4.3"
serde = { version = "=1.0.228", features = ["derive"] }
serde_json = "=1.0.150"
